<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    .btn-info {
      height: 22px;
      padding: 0 12px;
      border-radius: 8px;
      background: #ffffff;
      border: 1px solid #2f2f2f;
      font-family: 'Roboto', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: #2f2f2f;
      cursor: pointer;
    }

    .detail-panel {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s ease;
    }

    .detail-panel.open {
      max-height: 300px;
    }
  </style>
</head>
<body>

  <button class="btn-info" id="toggleBtn" onclick="toggleInfo()">查看資訊</button>

  <div class="detail-panel" id="detailPanel">
    <!-- 詳細資訊內容放這裡 -->
    <p>拍攝日期：2017/10/12</p>
    <p>格式：.jpg</p>
    <p>大小：456.97KB</p>
  </div>

  <script>
    let isOpen = false;

    function toggleInfo() {
      isOpen = !isOpen;
      const panel = document.getElementById('detailPanel');
      const btn = document.getElementById('toggleBtn');

      if (isOpen) {
        panel.classList.add('open');
        btn.textContent = '收起資訊';
      } else {
        panel.classList.remove('open');
        btn.textContent = '查看資訊';
      }
    }
  </script>

</body>
</html>
